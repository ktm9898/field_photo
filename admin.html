<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 사진 관리자 - 상권 현장방문 시스템</title>
    <meta name="description" content="상권 현장방문 사진 관리자 페이지 - 날짜/촬영자/업체번호별 검색 및 다운로드">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=yunk7qz7lm"></script>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;600;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        @keyframes fadeInRow {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .row-animate {
            animation: fadeInRow 0.25s ease forwards;
        }

        @keyframes slideInToast {
            from {
                transform: translateX(110%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-anim {
            animation: slideInToast 0.35s ease forwards;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }

        /* 라이트박스 */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #lightbox.hidden {
            display: none;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            color: white;
            font-size: 28px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 지도 */
        #admin-map {
            width: 100%;
            height: 380px;
            border-radius: 12px;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <!-- 라이트박스 -->
    <div id="lightbox" class="hidden">
        <span id="lightbox-close" onclick="document.getElementById('lightbox').classList.add('hidden')">&#x2715;</span>
        <img id="lightbox-img" src="" alt="확대 사진">
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // ── 설정 ──
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsmES-1l_IWNkDZkjA8S0ft4bADEYO_IMYelAXziftQGVZLEZlCaVkONgYSea0ty5vag/exec';
        const API_SECRET = 'FieldPhoto2026!';
        const ADMIN_PW = '2082';

        // ── Google Drive 이미지 URL 변환 (lh3 프록시 사용으로 이미지 로드 개선) ──
        function toThumbUrl(url) {
            if (!url) return '';
            // https://drive.google.com/uc?export=view&id=FILE_ID 에서 FILE_ID 추출
            const m = url.match(/[?&]id=([^&]+)/);
            if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
            return url;
        }

        // ── 날짜 한글 포맷 ("2026년 4월 20일 오후 8:42") ──
        function formatDateKr(dtStr) {
            if (!dtStr) return '-';
            // Apps Script에서 이미 한글로 저장된 경우 그대로 반환
            if (/\uB144/.test(dtStr)) return dtStr;
            // 이전 형식 ("2026-04-20 20:42:19" 또는 JS Date 문자열) 변환
            const d = new Date(dtStr);
            if (isNaN(d.getTime())) return dtStr;
            const y = d.getFullYear();
            const mo = d.getMonth() + 1;
            const day = d.getDate();
            const h = d.getHours();
            const min = String(d.getMinutes()).padStart(2, '0');
            const ampm = h < 12 ? '오전' : '오후';
            const h12 = h % 12 === 0 ? 12 : h % 12;
            return `${y}\ub144 ${mo}\uc6d4 ${day}\uc77c ${ampm} ${h12}:${min}`;
        }

        // ── 헬퍼: Drive URL → lh3 썸네일 URL ──
        function driveImgUrl(url) {
            if (!url) return '';
            let id = '';
            const m1 = url.match(/[?&]id=([^&]+)/);
            const m2 = url.match(/\/d\/([^/]+)/);
            if (m1) id = m1[1];
            else if (m2) id = m2[1];
            if (!id) return url;
            return 'https://lh3.googleusercontent.com/d/' + id;
        }

        // ── 헬퍼: 날짜 한글 형식 변환 ──
        function formatDateKo(dt) {
            if (!dt) return '-';
            // 이미 한글 형식이면 그대로 반환
            if (dt.includes('\ub144') && dt.includes('\uc6d4')) return dt;
            // 구형식 (영문/ISO 날짜)
            const d = new Date(dt);
            if (isNaN(d.getTime())) return dt;
            const y = d.getFullYear();
            const mo = d.getMonth() + 1;
            const day = d.getDate();
            const h = d.getHours();
            const min = String(d.getMinutes()).padStart(2, '0');
            const ampm = h < 12 ? '\uc624\uc804' : '\uc624\ud6c4';
            const h12 = h % 12 === 0 ? 12 : h % 12;
            return y + '\ub144 ' + mo + '\uc6d4 ' + day + '\uc77c ' + ampm + ' ' + h12 + ':' + min;
        }

        // ── 아이콘 컴포넌트 ──
        const Icon = ({ name, size = 18, className = '' }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // ── 토스트 ──
        const Toast = ({ message, type = 'success', onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
            const bg = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-blue-600' };
            return (
                <div className={`fixed top-6 right-6 z-[9999] ${bg[type] || bg.info} text-white px-5 py-3 rounded-xl shadow-2xl font-bold text-sm toast-anim flex items-center gap-2`}>
                    <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'} size={16} />
                    {message}
                </div>
            );
        };

        // ── 로그인 ──
        const Login = ({ onLogin }) => {
            const [pw, setPw] = useState('');
            const [err, setErr] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true); setErr(false);
                const ok = await onLogin(pw);
                if (!ok) { setErr(true); setPw(''); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                        <div className="bg-gradient-to-br from-slate-900 to-slate-700 p-8 text-center">
                            <div className="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Icon name="camera" size={30} className="text-white" />
                            </div>
                            <h1 className="text-xl font-black text-white">현장 사진 관리자</h1>
                            <p className="text-slate-400 text-sm mt-1 font-semibold">상권 현장방문 사진 관리 시스템</p>
                        </div>
                        <form onSubmit={handleSubmit} className="p-8 space-y-5">
                            <div>
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-2">Password</label>
                                <input
                                    type="password" autoFocus disabled={loading}
                                    className={`w-full px-4 py-4 bg-slate-50 border-2 rounded-xl outline-none text-center text-2xl font-black tracking-[0.5em] transition-all ${err ? 'border-red-400 bg-red-50' : 'border-slate-100 focus:border-blue-500 focus:bg-white'}`}
                                    value={pw} onChange={e => setPw(e.target.value)} placeholder="••••"
                                />
                                {err && <p className="text-red-500 text-xs font-bold text-center mt-2">비밀번호가 틀렸습니다.</p>}
                            </div>
                            <button type="submit" disabled={loading}
                                className="w-full py-4 bg-slate-900 text-white rounded-xl font-black text-sm shadow-lg hover:bg-slate-800 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                <Icon name={loading ? 'loader-2' : 'log-in'} size={18} className={loading ? 'animate-spin' : ''} />
                                {loading ? '인증 중...' : '접속하기'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ── 사진 갤러리 모달 ──
        const PhotoGalleryModal = ({ group, onClose }) => {
            if (!group || !group.photos) return null;

            const groupPhotos = group.photos;

            const openLightbox = (url) => {
                document.getElementById('lightbox-img').src = toThumbUrl(url);
                document.getElementById('lightbox').classList.remove('hidden');
            };

            const downloadAll = () => {
                groupPhotos.forEach((p, i) => {
                    setTimeout(() => {
                        const a = document.createElement('a');
                        a.href = p.photoUrl.replace('export=view', 'export=download');
                        a.download = p.fileName || `photo_${i + 1}.jpg`;
                        a.target = '_blank';
                        a.click();
                    }, i * 600);
                });
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
                    <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col ring-1 ring-slate-200" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                            <div>
                                <h2 className="text-lg font-black text-slate-800">
                                    업체번호: {group.bizNumber}
                                </h2>
                                <p className="text-xs text-slate-400 font-semibold mt-0.5">
                                    총 {groupPhotos.length}장의 사진
                                </p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={downloadAll}
                                    className="flex items-center gap-1.5 px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg text-xs font-bold hover:bg-emerald-100 transition-colors">
                                    <Icon name="download" size={14} /> 다운로드
                                </button>
                                <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                    <Icon name="x" size={20} className="text-slate-400" />
                                </button>
                            </div>
                        </div>

                        <div className="overflow-y-auto p-6 custom-scroll flex-1">
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {groupPhotos.map((p, idx) => (
                                    <div key={idx} className="group relative bg-slate-50 rounded-xl overflow-hidden border border-slate-100 hover:border-blue-200 transition-all hover:shadow-md">
                                        <div className="aspect-square overflow-hidden cursor-pointer" onClick={() => openLightbox(p.photoUrl)}>
                                            <img src={toThumbUrl(p.photoUrl)} alt={`사진 ${idx + 1}`}
                                                className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                                                onError={e => { e.target.src = p.photoUrl; }} />
                                        </div>
                                        <div className="p-3">
                                            <p className="text-xs font-bold text-slate-700 truncate">{p.photographer}</p>
                                            <p className="text-xs text-slate-400 font-semibold mt-0.5">{formatDateKr(p.datetime)}</p>
                                            {p.memo && <p className="text-xs text-slate-500 mt-1 line-clamp-2">{p.memo}</p>}
                                            {(p.address || (p.lat && p.lng)) && (
                                                <p className="text-xs text-slate-400 mt-1">{p.address || (Number(p.lat).toFixed(5) + ', ' + Number(p.lng).toFixed(5))}</p>
                                            )}
                                            <div className="flex gap-1 mt-2">
                                                <a href={p.photoUrl} target="_blank" rel="noreferrer"
                                                    className="flex-1 text-center text-xs py-1.5 bg-blue-50 text-blue-600 rounded-lg font-bold hover:bg-blue-100 transition-colors">
                                                    크게 보기
                                                </a>
                                                <a href={p.photoUrl.replace('export=view', 'export=download')} target="_blank" rel="noreferrer"
                                                    className="flex-1 text-center text-xs py-1.5 bg-emerald-50 text-emerald-600 rounded-lg font-bold hover:bg-emerald-100 transition-colors">
                                                    다운로드
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ── 지도 뷰 ──
        const MapView = ({ records }) => {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (!mapRef.current || mapInstanceRef.current) return;
                mapInstanceRef.current = new naver.maps.Map(mapRef.current, {
                    center: new naver.maps.LatLng(37.5365, 126.9780),
                    zoom: 14,
                    logoControl: false,
                    mapDataControl: false
                });
            }, []);

            useEffect(() => {
                if (!mapInstanceRef.current) return;
                markersRef.current.forEach(m => m.setMap(null));
                markersRef.current = [];

                const validRecords = records.filter(r => r.lat && r.lng);
                const groups = {};
                validRecords.forEach(r => {
                    const key = Number(r.lat).toFixed(5) + ',' + Number(r.lng).toFixed(5);
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(r);
                });

                Object.entries(groups).forEach(([coordKey, photos]) => {
                    const first = photos[0];
                    const count = photos.length;
                    
                    const badgeHtml = count > 1 ? `
                        <circle cx="28" cy="8" r="7" fill="white" stroke="#333" stroke-width="1.5"/>
                        <text x="28" y="11" font-size="8" font-weight="900" text-anchor="middle" fill="#333" font-family="sans-serif">${count}</text>
                    ` : '';

                    const marker = new naver.maps.Marker({
                        position: new naver.maps.LatLng(first.lat, first.lng),
                        map: mapInstanceRef.current,
                        icon: {
                            content: \`<div style="width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                                <svg width="36" height="36" viewBox="0 0 40 40">
                                    <path d="M16 8C10.5 8 6 12.5 6 18c0 7.5 10 15 10 15s10-7.5 10-15c0-5.5-4.5-10-10-10z" fill="#3b82f6"/>
                                    <circle cx="16" cy="18" r="4" fill="white"/>
                                    \${badgeHtml}
                                </svg>
                            </div>\`,
                            anchor: new naver.maps.Point(16, 33)
                        }
                    });

                    const bizList = [...new Set(photos.map(p => p.bizNumber))].join(', ');
                    const iw = new naver.maps.InfoWindow({
                        content: \`<div style="padding:12px;min-width:160px;font-family:'Noto Sans KR',sans-serif;">
                            <div style="font-size:13px;font-weight:900;color:#1e293b;margin-bottom:4px;">\${bizList}</div>
                            <div style="font-size:11px;color:#64748b;font-weight:600;">사진 \${count}장 · \${first.photographer} 등</div>
                        </div>\`,
                        borderWidth: 0,
                        backgroundColor: 'white',
                        borderColor: 'transparent',
                        disableAnchor: true,
                        pixelOffset: new naver.maps.Point(0, -8)
                    });

                    naver.maps.Event.addListener(marker, 'click', () => {
                        iw.open(mapInstanceRef.current, marker);
                    });

                    markersRef.current.push(marker);
                });

                if (markersRef.current.length > 0) {
                    const bounds = new naver.maps.LatLngBounds();
                    validRecords.forEach(r => bounds.extend(new naver.maps.LatLng(r.lat, r.lng)));
                    mapInstanceRef.current.fitBounds(bounds, { top: 40, right: 40, bottom: 40, left: 40 });
                }
            }, [records]);

            return <div id="admin-map" ref={mapRef}></div>;
        };

        // ── 메인 앱 ──
        const AdminApp = () => {
            const [isAuth, setIsAuth] = useState(() => !!sessionStorage.getItem('fp_admin_pw'));
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);
            const [photoModal, setPhotoModal] = useState(null);
            const [showMap, setShowMap] = useState(false);

            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [searchBiz, setSearchBiz] = useState('');
            const [searchPhotographer, setSearchPhotographer] = useState('');
            const [appliedFilter, setAppliedFilter] = useState({});

            const getPw = () => sessionStorage.getItem('fp_admin_pw') || '';

            const loadData = useCallback(async (forcePw) => {
                const pw = forcePw || getPw();
                if (!pw) return false;
                setLoading(true);
                try {
                    const resp = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'getAll', key: API_SECRET, pw })
                    });
                    const data = await resp.json();
                    if (data.success) {
                        setRecords(data.data || []);
                        setToast({ message: (data.total || 0) + '건의 사진 데이터를 불러왔습니다.', type: 'success' });
                        return true;
                    } else {
                        setToast({ message: data.error || '오류 발생', type: 'error' });
                        return false;
                    }
                } catch (err) {
                    setToast({ message: '데이터 로드 실패: ' + err.message, type: 'error' });
                    return false;
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => { if (isAuth) loadData(); }, [isAuth]);

            const handleLogin = async (pw) => {
                const ok = await loadData(pw);
                if (ok) { sessionStorage.setItem('fp_admin_pw', pw); setIsAuth(true); }
                return ok;
            };

            const filteredRecords = useMemo(() => {
                return records.filter(r => {
                    const dateKey = r.datetime ? r.datetime.substring(0, 10) : '';
                    if (appliedFilter.dateFrom && dateKey < appliedFilter.dateFrom) return false;
                    if (appliedFilter.dateTo && dateKey > appliedFilter.dateTo) return false;
                    if (appliedFilter.searchBiz && !r.bizNumber.includes(appliedFilter.searchBiz)) return false;
                    if (appliedFilter.searchPhotographer && !r.photographer.includes(appliedFilter.searchPhotographer)) return false;
                    return true;
                });
            }, [records, appliedFilter]);

            const groupedRecords = useMemo(() => {
                const groups = [];
                let currentGroup = null;

                for (const r of filteredRecords) {
                    if (!currentGroup) {
                        currentGroup = { ...r, photos: [r] };
                    } else {
                        // 인접한 행이면서 업체번호, 촬영자, 메모가 동일한 경우 같은 그룹으로 묶음
                        if (currentGroup.bizNumber === r.bizNumber &&
                            currentGroup.photographer === r.photographer &&
                            currentGroup.memo === r.memo) {
                            currentGroup.photos.push(r);
                        } else {
                            groups.push(currentGroup);
                            currentGroup = { ...r, photos: [r] };
                        }
                    }
                }
                if (currentGroup) groups.push(currentGroup);
                return groups;
            }, [filteredRecords]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                const todayCount = records.filter(r => r.datetime?.startsWith(today)).length;
                const bizSet = new Set(records.map(r => r.bizNumber).filter(Boolean));
                const photographerSet = new Set(records.map(r => r.photographer).filter(Boolean));
                return { total: records.length, today: todayCount, bizCount: bizSet.size, photographerCount: photographerSet.size };
            }, [records]);

            const downloadCSV = () => {
                const headers = ['촬영일시', '촬영자', '업체번호', '위도', '경도', '주소', '사진URL', '메모', '파일명'];
                const rows = [headers.join(',')];
                filteredRecords.forEach(r => {
                    rows.push([r.datetime, r.photographer, r.bizNumber, r.lat, r.lng, r.address, r.photoUrl, r.memo, r.fileName]
                        .map(v => '"' + (v || '').toString().replace(/"/g, '""') + '"')
                        .join(','));
                });
                const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = '현장사진_' + new Date().toISOString().split('T')[0] + '.csv'; a.click();
                URL.revokeObjectURL(url);
            };

            const downloadGroup = (group) => {
                if (!group.photos || !group.photos.length) return;
                group.photos.forEach((p, i) => {
                    setTimeout(() => {
                        const a = document.createElement('a');
                        a.href = (p.photoUrl || '').replace('export=view', 'export=download');
                        a.download = p.fileName || ('photo_' + (i + 1) + '.jpg');
                        a.target = '_blank';
                        a.click();
                    }, i * 800);
                });
                setToast({ message: group.photos.length + '장 다운로드 시작', type: 'success' });
            };

            const handleSendEmailRow = async (group) => {
                const targetEmail = prompt('어떤 이메일로 발송하시겠습니까?', group.email || '');
                if (!targetEmail) return;
                setToast({ message: '메일 발송을 요청했습니다. (첨부파일 크기에 따라 시간이 걸릴 수 있습니다.)', type: 'info' });
                try {
                    const pw = sessionStorage.getItem('fp_admin_pw');
                    const fileIds = group.photos.map(p => p.fileId).filter(Boolean);
                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'sendEmail', key: API_SECRET, pw, bizNumber: group.bizNumber, email: targetEmail, fileIds })
                    });
                    const result = await res.json();
                    if (result.success) setToast({ message: '이메일 발송을 완료했습니다.', type: 'success' });
                    else setToast({ message: '발송 실패: ' + result.error, type: 'error' });
                } catch(err) {
                    setToast({ message: '네트워크 오류: ' + err.message, type: 'error' });
                }
            };

            if (!isAuth) return <Login onLogin={handleLogin} />;

            return (
                <div className="min-h-screen pb-12">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}

                    <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl">
                        <div className="max-w-7xl mx-auto px-6 py-5">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                                        <Icon name="camera" size={22} className="text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black tracking-tight">현장 사진 관리자</h1>
                                        <p className="text-xs text-slate-400 font-semibold">상권 현장방문 사진 관리 시스템</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setShowMap(m => !m)}
                                        className={`text-xs px-3 py-2 rounded-lg font-bold transition-all flex items-center gap-1.5 ${showMap ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-300 border border-slate-600 hover:bg-slate-600/50'}`}>
                                        <Icon name="map" size={14} /> {showMap ? '지도 숨기기' : '지도 보기'}
                                    </button>
                                    <button onClick={() => { setIsAuth(false); sessionStorage.removeItem('fp_admin_pw'); }}
                                        className="text-xs px-3 py-2 bg-slate-700/50 hover:bg-red-500/20 text-slate-300 hover:text-red-400 border border-slate-600 rounded-lg font-bold transition-all flex items-center gap-1.5">
                                        <Icon name="log-out" size={14} /> 로그아웃
                                    </button>
                                    <a href="index.html"
                                        className="text-xs px-3 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors flex items-center gap-1.5">
                                        <Icon name="camera" size={14} /> 촬영 페이지
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 mt-6 space-y-5">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {[
                                { label: '총 사진', value: stats.total, unit: '장', icon: 'image', color: 'bg-blue-100 text-blue-600' },
                                { label: '오늘 촬영', value: stats.today, unit: '장', icon: 'calendar', color: 'bg-emerald-100 text-emerald-600' },
                                { label: '업체 수', value: stats.bizCount, unit: '곳', icon: 'building-2', color: 'bg-orange-100 text-orange-600' },
                                { label: '촬영자 수', value: stats.photographerCount, unit: '명', icon: 'users', color: 'bg-purple-100 text-purple-600' },
                            ].map(s => (
                                <div key={s.label} className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:shadow-md transition-shadow">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-11 h-11 rounded-xl flex items-center justify-center ${s.color}`}>
                                            <Icon name={s.icon} size={22} />
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold text-slate-400 uppercase">{s.label}</p>
                                            <p className="text-2xl font-black text-slate-800">
                                                {s.value}<span className="text-sm font-bold text-slate-400 ml-1">{s.unit}</span>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {showMap && (
                            <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                                <h3 className="text-sm font-black text-slate-700 mb-3 flex items-center gap-2">
                                    <Icon name="map-pin" size={16} className="text-blue-500" /> 촬영 위치 지도
                                    <span className="text-xs font-semibold text-slate-400 ml-1">({filteredRecords.filter(r => r.lat && r.lng).length}개 위치)</span>
                                </h3>
                                <MapView records={filteredRecords} />
                            </div>
                        )}

                        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
                            <div className="flex flex-wrap items-end gap-3">
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">시작일</label>
                                    <input type="date" className="block px-3 py-2 border border-slate-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none"
                                        value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">종료일</label>
                                    <input type="date" className="block px-3 py-2 border border-slate-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none"
                                        value={dateTo} onChange={e => setDateTo(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">업체번호</label>
                                    <input type="text" placeholder="검색..." className="block px-3 py-2 border border-slate-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none w-32"
                                        value={searchBiz} onChange={e => setSearchBiz(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">촬영자</label>
                                    <input type="text" placeholder="이름 검색..." className="block px-3 py-2 border border-slate-200 rounded-lg text-sm font-bold focus:border-blue-500 outline-none w-28"
                                        value={searchPhotographer} onChange={e => setSearchPhotographer(e.target.value)} />
                                </div>
                                <div className="flex gap-2 ml-auto flex-wrap">
                                    <button onClick={() => setAppliedFilter({ dateFrom, dateTo, searchBiz, searchPhotographer })}
                                        className="px-4 py-2 text-sm font-bold text-white bg-slate-800 rounded-lg hover:bg-slate-900 transition-colors flex items-center gap-1 shadow-sm">
                                        <Icon name="search" size={14} /> 조회
                                    </button>
                                    <button onClick={() => { setDateFrom(''); setDateTo(''); setSearchBiz(''); setSearchPhotographer(''); setAppliedFilter({}); }}
                                        className="px-4 py-2 text-sm font-bold text-slate-400 hover:text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 transition-all flex items-center gap-1">
                                        <Icon name="rotate-ccw" size={14} /> 초기화
                                    </button>
                                    <button onClick={() => loadData()}
                                        className="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1">
                                        <div className={loading ? 'animate-spin' : ''} style={{ display: 'flex' }}>
                                            <Icon name="refresh-cw" size={14} />
                                        </div>
                                        새로고침
                                    </button>
                                    <button onClick={downloadCSV}
                                        className="px-4 py-2 text-sm font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors flex items-center gap-1">
                                        <Icon name="file-spreadsheet" size={14} /> CSV
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
                                <span className="text-sm font-black text-slate-700">
                                    사진 목록
                                </span>
                                <span className="text-xs font-bold text-slate-400">{groupedRecords.length}건 / 전체 {records.length}장</span>
                            </div>
                            <div className="overflow-x-auto custom-scroll">
                                <table className="w-full text-sm border-collapse min-w-[900px]">
                                    <thead>
                                        <tr className="bg-slate-50 text-xs font-black text-slate-500 uppercase tracking-wider border-b-2 border-slate-200">
                                            <th className="px-2 py-3 text-center w-8">#</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap">업체번호</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap">썸네일</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap" style={{width:'150px'}}>촬영일시</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap">촬영자</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap">위치</th>
                                            <th className="px-3 py-3 text-center" style={{minWidth:'100px',maxWidth:'160px'}}>메모</th>
                                            <th className="px-3 py-3 text-center whitespace-nowrap">작업</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredRecords.length === 0 ? (
                                            <tr>
                                                <td colSpan={9} className="px-4 py-16 text-center">
                                                    <div className="flex flex-col items-center gap-3">
                                                        <div className={`w-16 h-16 rounded-full flex items-center justify-center ${loading ? 'bg-blue-50' : 'bg-slate-100'}`}>
                                                            <Icon name={loading ? 'loader-2' : 'image-off'} size={32} className={loading ? 'text-blue-500 animate-spin' : 'text-slate-300'} />
                                                        </div>
                                                        <p className={`${loading ? 'text-blue-600' : 'text-slate-400'} font-bold`}>
                                                            {loading ? '데이터를 불러오는 중...' : (records.length === 0 ? '등록된 사진이 없습니다.' : '검색 결과가 없습니다.')}
                                                        </p>
                                                    </div>
                                                </td>
                                            </tr>
                                                ) : groupedRecords.map((r, idx) => (
                                            <tr key={idx} className="border-b border-slate-100 hover:bg-blue-50/30 transition-colors">
                                                <td className="px-2 py-3 text-center text-xs font-bold text-slate-400">{idx + 1}</td>
                                                <td className="px-3 py-3 text-center">
                                                    <div className="font-black text-slate-700 text-sm">
                                                        {r.bizNumber || '-'}
                                                    </div>
                                                </td>
                                                <td className="px-3 py-3 text-center">
                                                    {r.photoUrl ? (
                                                        <img src={toThumbUrl(r.photoUrl)} alt="썸네일"
                                                            className="w-14 h-14 object-cover rounded-lg border border-slate-200 cursor-pointer hover:opacity-80 transition-opacity mx-auto"
                                                            onClick={() => { document.getElementById('lightbox-img').src = toThumbUrl(r.photoUrl); document.getElementById('lightbox').classList.remove('hidden'); }} />
                                                    ) : (
                                                        <div className="w-14 h-14 bg-slate-100 rounded-lg flex items-center justify-center mx-auto">
                                                            <Icon name="image-off" size={20} className="text-slate-300" />
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-3 py-3 text-center text-xs font-bold text-slate-600" style={{width:'150px'}}>
                                                    {(() => {
                                                        const str = formatDateKr(r.datetime);
                                                        const ampmIdx = str.indexOf('오전') !== -1 ? str.indexOf('오전') : str.indexOf('오후');
                                                        if (ampmIdx > 0) return <>{str.substring(0, ampmIdx).trim()}<br />{str.substring(ampmIdx)}</>;
                                                        return str;
                                                    })()}
                                                </td>
                                                <td className="px-3 py-3 text-center">
                                                    <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-700">
                                                        {r.photographer || '-'}
                                                    </span>
                                                </td>
                                                <td className="px-3 py-3 text-center">
                                                    {(r.address || (r.lat && r.lng)) ? (
                                                        <span className="text-xs text-emerald-600 font-bold">
                                                            {r.address || (Number(r.lat).toFixed(4) + ', ' + Number(r.lng).toFixed(4))}
                                                        </span>
                                                    ) : (
                                                        <span className="text-xs text-slate-300">-</span>
                                                    )}
                                                </td>
                                                <td className="px-3 py-3 text-center" style={{minWidth:'100px',maxWidth:'160px'}}>
                                                    <p className="text-xs text-slate-600 font-semibold line-clamp-2 text-center">
                                                        {r.memo || <span className="text-slate-300">-</span>}
                                                    </p>
                                                </td>
                                                <td className="px-3 py-3 text-center whitespace-nowrap">
                                                    <div className="flex items-center justify-center gap-1.5 flex-nowrap shrink-0">
                                                        <button onClick={() => setPhotoModal(r)}
                                                            className="px-2.5 py-1.5 bg-slate-50 text-slate-600 border border-slate-200 rounded-lg text-xs font-bold hover:bg-slate-100 transition-colors flex-1 min-w-12">
                                                            갤러리({r.photos.length})
                                                        </button>
                                                        <button onClick={() => downloadGroup(r)}
                                                            className="px-2.5 py-1.5 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-lg text-xs font-bold hover:bg-emerald-100 transition-colors" title="다운로드">
                                                            ↓
                                                        </button>
                                                        <button onClick={() => handleSendEmailRow(r)}
                                                            className="px-2.5 py-1.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg text-xs font-bold hover:bg-blue-100 transition-colors" title="메일 발송">
                                                            ✉️
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* ── 사진 갤러리 모달 ── */}
                    {photoModal && (
                        <PhotoGalleryModal
                            group={photoModal}
                            onClose={() => setPhotoModal(null)}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>

</html>
