<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상권 현장 촬영</title>
    <meta name="description" content="상권 현장방문 사진 촬영 및 GPS 마커 등록 시스템">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <script type="text/javascript"
        src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=yunk7qz7lm&submodules=geocoder"></script>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        /* ── 지도 ── */
        #map {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* ── 상단 헤더 바 ── */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        #top-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #top-bar-title {
            font-size: 15px;
            font-weight: 900;
            color: #f1f5f9;
            letter-spacing: -0.3px;
        }

        #top-bar-sub {
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
        }

        /* ── 촬영자 칩 ── */
        #photographer-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #photographer-chip:hover {
            background: rgba(59, 130, 246, 0.25);
        }

        #photographer-name {
            font-size: 12px;
            font-weight: 700;
            color: #93c5fd;
        }

        /* ── 관리자 링크 ── */
        #admin-link {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        #admin-link:hover {
            color: #94a3b8;
            background: rgba(100, 116, 139, 0.1);
        }

        /* ── 하단 플로팅 버튼 영역 ── */
        #bottom-controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 0 20px;
        }

        /* 내 위치 버튼 */
        #my-location-btn {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #my-location-btn:hover {
            transform: scale(1.05);
        }

        #my-location-btn:active {
            transform: scale(0.95);
        }

        /* 메인 촬영 버튼 */
        #capture-btn {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.5), 0 2px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #capture-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.7), 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        #capture-btn:active {
            transform: scale(0.92);
        }

        #capture-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        /* ── 바텀시트 ── */
        #bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }

        #bottom-sheet-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2001;
            background: #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 0 20px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        #bottom-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 14px auto 20px;
        }

        .sheet-title {
            font-size: 16px;
            font-weight: 900;
            color: #f1f5f9;
            margin-bottom: 6px;
        }

        .sheet-subtitle {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 24px;
            font-weight: 600;
        }

        /* GPS 정보 뱃지 */
        #gps-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 16px;
        }

        #gps-badge span {
            font-size: 11px;
            font-weight: 700;
            color: #34d399;
        }

        #gps-badge.no-gps {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        #gps-badge.no-gps span {
            color: #f87171;
        }

        /* 입력 필드 */
        .field-group {
            margin-bottom: 14px;
        }

        .field-label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        .required-dot {
            color: #f87171;
            margin-left: 3px;
        }

        .field-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
            font-family: 'Noto Sans KR', sans-serif;
            transition: border-color 0.2s;
        }

        .field-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(59, 130, 246, 0.05);
        }

        .field-input::placeholder {
            color: #475569;
        }

        textarea.field-input {
            resize: none;
            height: 80px;
        }

        /* 업로드 버튼 */
        #upload-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        #upload-btn:hover {
            filter: brightness(1.1);
        }

        #upload-btn:active {
            transform: scale(0.98);
        }

        #upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #cancel-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        #cancel-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
        }

        /* ── 촬영자 설정 모달 ── */
        #photographer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.3s;
        }

        #photographer-overlay.hidden {
            display: none;
        }

        #photographer-modal {
            background: #1e293b;
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #photographer-modal h2 {
            font-size: 18px;
            font-weight: 900;
            color: #f1f5f9;
            margin: 0 0 6px;
        }

        #photographer-modal p {
            font-size: 12px;
            color: #64748b;
            margin: 0 0 20px;
            font-weight: 600;
        }

        #photographer-save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            margin-top: 4px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* ── 토스트 ── */
        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            border-color: rgba(16, 185, 129, 0.4);
        }

        #toast.error {
            border-color: rgba(239, 68, 68, 0.4);
        }

        #toast.info {
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* ── 로딩 ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loading-screen h1 {
            font-size: 20px;
            font-weight: 900;
            color: #f1f5f9;
            margin: 0;
        }

        #loading-screen p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
            font-weight: 600;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── 마커 팝업 (InfoWindow) ── */
        .marker-popup {
            padding: 14px;
            width: 240px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
            font-family: 'Noto Sans KR', sans-serif;
        }

        .popup-biz {
            font-size: 13px;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 2px;
        }

        .popup-meta {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .popup-thumb-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }

        .popup-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .popup-thumb:hover {
            opacity: 0.85;
        }

        .popup-count-badge {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

        .popup-add-btn {
            width: 100%;
            padding: 8px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #3b82f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .popup-add-btn:hover {
            background: #dbeafe;
        }

        /* 업로드 진행 오버레이 */
        #upload-progress-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 4000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            display: none;
        }

        #upload-progress-overlay.show {
            display: flex;
        }

        #upload-progress-overlay p {
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        /* 촬영 썸네일 그리드 */
        #captured-thumbs-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
    </style>
</head>

<body>

    <!-- 로딩 화면 -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h1>상권 현장 촬영</h1>
        <p>지도를 불러오는 중...</p>
    </div>

    <!-- 업로드 진행 오버레이 -->
    <div id="upload-progress-overlay">
        <div class="spinner"></div>
        <p id="upload-progress-text">사진을 업로드하는 중...</p>
    </div>

    <!-- 토스트 -->
    <div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>

    <!-- 상단 헤더 -->
    <div id="top-bar">
        <div id="top-bar-left">
            <div>
                <div id="top-bar-title">현장 촬영</div>
                <div id="top-bar-sub">상권 방문 사진 기록</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div id="photographer-chip" onclick="showPhotographerModal()">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="#93c5fd" style="flex-shrink:0"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                <span id="photographer-name">이름 설정</span>
            </div>
            <a href="admin.html" id="admin-link">관리자 →</a>
        </div>
    </div>

    <!-- 지도 -->
    <div id="map"></div>

    <!-- 하단 컨트롤 -->
    <div id="bottom-controls">
        <!-- 내 위치 -->
        <button id="my-location-btn" onclick="moveToMyLocation()" title="내 위치로 이동">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="#3b82f6">
                <path
                    d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06z" />
            </svg>
        </button>

        <!-- 메인 촬영 버튼 -->
        <button id="capture-btn" onclick="onCaptureClick()" title="현장 촬영">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7-13H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V5.5a3 3 0 0 0-3-3zm1 15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5.5a1 1 0 0 1 1-1h.586l1-1.5H17.5l.914 1.5H19a1 1 0 0 1 1 1V17.5z" />
            </svg>
        </button>

        <!-- 위치 이동 버튼 (오른쪽) -->
        <button id="my-location-btn" onclick="moveToMyLocation()" title="현재 위치" style="visibility:hidden"></button>
    </div>

    <!-- 촬영자 설정 모달 — 기본 hidden (이미 저장된 경우 안 뜸) -->
    <div id="photographer-overlay" class="hidden">
        <div id="photographer-modal">
            <h2>촬영자 설정</h2>
            <p>이름을 입력하면 이후 자동으로 적용됩니다</p>
            <div class="field-group">
                <label class="field-label">이름<span class="required-dot">*</span></label>
                <input type="text" id="photographer-input" class="field-input" placeholder="예: 홍길동" maxlength="20">
            </div>
            <div class="field-group">
                <label class="field-label">이메일 (선택)</label>
                <input type="email" id="photographer-email-input" class="field-input" placeholder="예: user@example.com">
            </div>
            <button id="photographer-save-btn" onclick="savePhotographer()">확인</button>
        </div>
    </div>

    <!-- 바텀시트 오버레이 -->
    <div id="bottom-sheet-overlay" onclick="closeBottomSheet()"></div>

    <!-- 바텀시트 -->
    <div id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">사진 정보 입력</div>
        <div class="sheet-subtitle" id="sheet-datetime"></div>

        <!-- 촬영된 사진 썸네일 -->
        <div id="captured-thumbs" style="display:none;margin-bottom:16px;">
            <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:8px;">촬영된 사진</div>
            <div id="captured-thumbs-grid"></div>
        </div>

        <!-- GPS 뱃지 -->
        <div id="gps-badge">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="#34d399" style="flex-shrink:0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span id="gps-text">위치 획득 중...</span>
        </div>

        <!-- 입력 필드 -->
        <div class="field-group">
            <label class="field-label">제목(업체명)<span class="required-dot">*</span></label>
            <input type="text" id="input-biz" class="field-input" placeholder="예: 2026-001" maxlength="30">
        </div>

        <div class="field-group">
            <label class="field-label">촬영자<span class="required-dot">*</span></label>
            <input type="text" id="input-photographer" class="field-input" placeholder="이름 입력" maxlength="20">
        </div>

        <div class="field-group">
            <label class="field-label">메모</label>
            <textarea id="input-memo" class="field-input" placeholder="예: 정문 사진, 간판 상태 양호 등"></textarea>
        </div>

        <button id="upload-btn" onclick="uploadAllPhotos()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
                <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" />
            </svg>
            <span id="upload-btn-text">업로드</span>
        </button>
        <button id="cancel-btn" onclick="closeBottomSheet()">취소 (사진 삭제)</button>
    </div>

    <!-- 카메라 input (숨김) -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">

    <script>
        // ─────────────────────────────────────────────
        //  설정
        // ─────────────────────────────────────────────
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsmES-1l_IWNkDZkjA8S0ft4bADEYO_IMYelAXziftQGVZLEZlCaVkONgYSea0ty5vag/exec';
        const API_SECRET = 'FieldPhoto2026!';

        // ─────────────────────────────────────────────
        //  상태 변수
        // ─────────────────────────────────────────────
        let map;
        let myLocationMarker = null;
        let infowindow = null;
        let allMarkers = {};        // key: "lat,lng" → { marker, photos[] }
        let capturedPhotos = [];    // [{ dataUrl, blob, mimeType, gps }] — 연속촬영 배열
        let currentGPS = null;      // { lat, lng }
        let currentAddress = '';    // 역지오코딩 주소
        let pendingLatLng = null;   // 마커에서 추가촬영 시 고정 위치
        let pendingBizNumber = '';  // 마커 추가촬영 시 업체번호 자동세팅

        // ─────────────────────────────────────────────
        //  초기화
        // ─────────────────────────────────────────────
        window.onload = function () {
            // 지도 초기화
            map = new naver.maps.Map('map', {
                center: new naver.maps.LatLng(37.5365, 126.9780),
                zoom: 15,
                logoControl: false,
                mapDataControl: false,
            });

            naver.maps.Event.addListener(map, 'click', () => {
                if (infowindow) infowindow.close();
            });

            document.getElementById('loading-screen').style.display = 'none';

            // GPS 추적 시작
            startTracking();

            // 촬영자 확인 — localStorage에 저장된 값이 있으면 모달 안 띄움
            const savedName = localStorage.getItem('photographer_name');
            if (savedName) {
                document.getElementById('photographer-name').textContent = savedName;
                // 모달은 기본 hidden 상태 유지
                // 저장된 촬영자의 기존 마커 복원
                loadMyMarkers();
            } else {
                showPhotographerModal();
            }

            // 카메라 input 이벤트
            document.getElementById('camera-input').addEventListener('change', onPhotoSelected);

            // 페이지 리로드 시 촬영 중이던 사진 복원
            restoreCaptureState();
        };

        // ─────────────────────────────────────────────
        //  GPS 추적 + 역지오코딩
        // ─────────────────────────────────────────────
        function startTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    currentGPS = { lat, lng };

                    const latLng = new naver.maps.LatLng(lat, lng);
                    if (!myLocationMarker) {
                        myLocationMarker = new naver.maps.Marker({
                            position: latLng,
                            map,
                            icon: {
                                content: '<div style="width:16px;height:16px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 12px rgba(59,130,246,0.8);"></div>',
                                anchor: new naver.maps.Point(8, 8)
                            },
                            zIndex: 1000
                        });
                        map.setCenter(latLng);
                    } else {
                        myLocationMarker.setPosition(latLng);
                    }

                    // 역지오코딩 (주소 업데이트)
                    reverseGeocode(lat, lng);
                },
                (err) => console.warn('GPS 오류:', err),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 8000 }
            );
        }

        // 역지오코딩: 좌표 → 주소
        function reverseGeocode(lat, lng) {
            naver.maps.Service.reverseGeocode(
                {
                    coords: new naver.maps.LatLng(lat, lng),
                    orders: [naver.maps.Service.OrderType.ROAD_ADDR, naver.maps.Service.OrderType.ADDR].join(',')
                },
                function (status, response) {
                    if (status !== naver.maps.Service.Status.OK) {
                        currentAddress = '';
                        return;
                    }
                    const items = response.v2.results;
                    if (items && items.length > 0) {
                        // 도로명 주소 우선, 없으면 지번주소
                        const addr = items[0].name === 'roadaddr'
                            ? response.v2.address.roadAddress
                            : response.v2.address.jibunAddress;
                        currentAddress = addr || '';
                        // 바텀시트가 열려있으면 GPS 뱃지도 즉시 업데이트
                        if (document.getElementById('bottom-sheet').classList.contains('open')) {
                            updateGpsBadge();
                        }
                    }
                }
            );
        }

        // GPS 뱃지 업데이트 (주소 우선, 없으면 좌표)
        function updateGpsBadge() {
            const gpsEl = document.getElementById('gps-text');
            const badge = document.getElementById('gps-badge');
            const gps = pendingLatLng || currentGPS;
            if (gps) {
                gpsEl.textContent = currentAddress
                    || ('위도 ' + gps.lat.toFixed(6) + ', 경도 ' + gps.lng.toFixed(6));
                badge.classList.remove('no-gps');
            } else {
                gpsEl.textContent = 'GPS 좌표 없음';
                badge.classList.add('no-gps');
            }
        }

        window.moveToMyLocation = function () {
            if (myLocationMarker) {
                map.panTo(myLocationMarker.getPosition());
                map.setZoom(17);
            } else {
                showToast('위치를 불러오는 중입니다...', 'info');
            }
        };

        // ─────────────────────────────────────────────
        //  촬영종료 UI 바 (촬영된 사진이 있을 때만 표시)
        // ─────────────────────────────────────────────
        function updateCaptureUI() {
            const count = capturedPhotos.length;

            if (existing) existing.remove();

            if (count > 0) {
                const bar = document.createElement('div');

                bar.innerHTML =

                        '<span style="font-size:12px;font-weight:700;color:#94a3b8;">촬영된 사진</span>' +
                        '<span style="font-size:16px;font-weight:900;color:#f1f5f9;">' + count + '장</span>' +
                        '<button onclick="openBottomSheetForUpload()" style="padding:8px 20px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:20px;font-size:13px;font-weight:900;color:white;cursor:pointer;font-family:\'Noto Sans KR\',sans-serif;">촬영 종료</button>' +
                        '<button onclick="clearCapturedPhotos()" style="padding:8px 12px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:20px;font-size:12px;font-weight:700;color:#f87171;cursor:pointer;font-family:\'Noto Sans KR\',sans-serif;">취소</button>' +
                    '</div>';
                document.body.appendChild(bar);
            }
        }

        // ─────────────────────────────────────────────
        //  촬영 상태 백업/복원 (모바일 카메라 앱 메모리 해제 대응)
        // ─────────────────────────────────────────────
        function saveCaptureState() {
            try {
                const state = {
                    photos: capturedPhotos.map(function (p) {
                        return { dataUrl: p.dataUrl, mimeType: p.mimeType, gps: p.gps };
                    }),
                    pendingLatLng: pendingLatLng,
                    pendingBizNumber: pendingBizNumber
                };
                sessionStorage.setItem('fp_capture_state', JSON.stringify(state));
            } catch (e) {
                console.warn('촬영 상태 저장 실패:', e);
            }
        }

        function restoreCaptureState() {
            try {
                const saved = sessionStorage.getItem('fp_capture_state');
                if (!saved) return;
                var state = JSON.parse(saved);
                if (state.photos && state.photos.length > 0) {
                    capturedPhotos = state.photos;
                    pendingLatLng = state.pendingLatLng || null;
                    pendingBizNumber = state.pendingBizNumber || '';
                    updateCaptureUI();
                    showToast('촬영 중이던 사진 ' + capturedPhotos.length + '장 표시', 'info');
                }
            } catch (e) {
                console.warn('촬영 상태 복원 실패:', e);
            }
        }

        function clearCaptureState() {
            sessionStorage.removeItem('fp_capture_state');
        }

        // ─────────────────────────────────────────────
        //  촬영 버튼 클릭
        // ─────────────────────────────────────────────
        function onCaptureClick() {
            if (!currentGPS) {
                showToast('GPS를 아직 수신하지 못했습니다. 잠시 기다려주세요.', 'error');
                return;
            }
            // 연속촬영 중이면 첫 촬영 위치 유지, 새 세션이면 초기화
            if (capturedPhotos.length === 0) {

            }

        // ─────────────────────────────────────────────
        //  사진 선택 후 처리 — 배열에 추가, 바텀시트 안 열림
        // ─────────────────────────────────────────────
        function onPhotoSelected(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 현재 GPS 스냅샷 저장
            const gps = pendingLatLng
                ? { lat: pendingLatLng.lat, lng: pendingLatLng.lng }
                : (currentGPS ? { lat: currentGPS.lat, lng: currentGPS.lng } : null);

            // 첫 촬영 시 위치를 고정하여 연속촬영이 같은 마커로 묶이도록 함
            if (!pendingLatLng && gps) {
                pendingLatLng = { lat: gps.lat, lng: gps.lng };
            }

            resizeImage(file, 1920).then(function (result) {
                capturedPhotos.push({ dataUrl: result.dataUrl, blob: result.blob, mimeType: result.mimeType, gps: gps });
                updateCaptureUI();
                saveCaptureState();
                showToast(capturedPhotos.length + '장 촬영되었습니다.', 'success');
            }).catch(function (err) {
                console.error('이미지 처리 오류:', err);
                showToast('사진 처리 중 오류가 발생했습니다. 다시 시도해주세요.', 'error');
            });

            // Input 초기화 (동일 파일 재선택 허용)
            e.target.value = '';
        }

        // 촬영된 사진 모두 취소
        window.clearCapturedPhotos = function () {

        // ─────────────────────────────────────────────
        //  이미지 리사이즈 (Canvas API)
        // ─────────────────────────────────────────────
        function resizeImage(file, maxSize) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const mimeType = file.type || 'image/jpeg';
                        const dataUrl = canvas.toDataURL(mimeType, 0.88);
                        canvas.toBlob(blob => resolve({ dataUrl, blob, mimeType }), mimeType, 0.88);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ─────────────────────────────────────────────
        //  사진 일괄 업로드
        // ─────────────────────────────────────────────
        async function uploadAllPhotos() {
            const bizNumber = document.getElementById('input-biz').value.trim();
            const photographer = document.getElementById('input-photographer').value.trim();
            const email = localStorage.getItem('photographer_email') || '';
            const memo = document.getElementById('input-memo').value.trim();

            if (!bizNumber) { showToast('제목(업체명)을 입력해주세요.', 'error'); return; }
            if (!photographer) { showToast('촬영자 이름을 입력해주세요.', 'error'); return; }
            if (capturedPhotos.length === 0) { showToast('사진이 없습니다.', 'error'); return; }

            // 이름 저장
            localStorage.setItem('photographer_name', photographer);
            document.getElementById('photographer-name').textContent = photographer;

            const total = capturedPhotos.length;
            setUploadUiLoading(true, 1, total);

            let successCount = 0;
            const uploadedFileIds = [];

            for (let i = 0; i < capturedPhotos.length; i++) {
                const photo = capturedPhotos[i];
                const gps = photo.gps || currentGPS;

                if (!gps) {
                    showToast((i + 1) + '번 사진: GPS 좌표 없음', 'error');
                    continue;
                }

                try {
                    setUploadUiLoading(true, i + 1, total);
                    const base64 = photo.dataUrl.split(',')[1];
                    const payload = {
                        action: 'upload',
                        key: API_SECRET,
                        imageBase64: base64,
                        mimeType: photo.mimeType,
                        bizNumber,
                        photographer,
                        email,
                        memo,
                        lat: gps.lat,
                        lng: gps.lng,
                        address: currentAddress || ''
                    };

                    const resp = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await resp.json();

                    if (result.success) {
                        addOrUpdateMarker(gps.lat, gps.lng, {
                            bizNumber, photographer, memo,
                            datetime: formatDateTimeKr(new Date()),
                            photoUrl: result.fileUrl
                        });
                        successCount++;
                        if (result.fileId) uploadedFileIds.push(result.fileId);
                    } else {
                        showToast((i + 1) + '번 업로드 실패: ' + result.error, 'error');
                    }
                } catch (err) {
                    showToast((i + 1) + '번 오류: ' + err.message, 'error');
                }
            }

            if (successCount > 0 && email && uploadedFileIds.length > 0) {
                setUploadUiLoading(true, '이메일', '발송'); // 진행상태 창 변경
                document.getElementById('upload-progress-text').textContent = '이메일을 발송하는 중...';
                try {
                    const mailPayload = {
                        action: 'sendEmail', key: API_SECRET, pw: '', // 프론트는 pw 모름 (Apps Script가 pw 검사 안하도록 배포되어 있음)
                        bizNumber, email, fileIds: uploadedFileIds
                    };
                    const mailRes = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST', body: JSON.stringify(mailPayload)
                    });
                    const mailResult = await mailRes.json();
                    setUploadUiLoading(false);
                    
                    if (mailResult.success) {
                        closeBottomSheet();
                        showToast(successCount + '장 업로드 및 메일 발송 완료! (' + bizNumber + ')', 'success');
                    } else {
                        closeBottomSheet();
                        showToast('업로드성공 (메일 발송 실패: ' + mailResult.error + ')', 'error');
                    }
                } catch(e) {
                    setUploadUiLoading(false);
                    closeBottomSheet();
                    showToast('업로드성공 (메일 예외: ' + e.message + ')', 'error');
                }
            } else if (successCount > 0) {
                setUploadUiLoading(false);
                closeBottomSheet();
                showToast(successCount + '장 업로드 완료! (' + bizNumber + ')', 'success');
            } else {
                setUploadUiLoading(false);
            }
        }

        function setUploadUiLoading(loading, current, total) {
            const btn = document.getElementById('upload-btn');
            const overlay = document.getElementById('upload-progress-overlay');
            btn.disabled = loading;
            if (loading) {
                let txt = '업로드 중...';
                if (current === '이메일') txt = '이메일 발송 중...';
                else if (current && total) txt = '업로드 중 (' + current + '/' + total + '장)...';
                btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div> ' + txt;
                if (current !== '이메일') {
                  document.getElementById('upload-progress-text').textContent = txt;
                }
            } else {
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg> <span id="upload-btn-text">업로드</span>';
                document.getElementById('upload-progress-text').textContent = '사진을 업로드하는 중...'; // 복구
            }
            overlay.classList.toggle('show', loading);
        }

        // ─────────────────────────────────────────────
        //  한국어 날짜/시간 포맷 (Apps Script와 동일 형식)
        // ─────────────────────────────────────────────
        function formatDateTimeKr(d) {
            const y = d.getFullYear();
            const mo = d.getMonth() + 1;
            const day = d.getDate();
            const h = d.getHours();
            const min = String(d.getMinutes()).padStart(2, '0');
            const ampm = h < 12 ? '오전' : '오후';
            const h12 = h % 12 === 0 ? 12 : h % 12;
            return y + '년 ' + mo + '월 ' + day + '일 ' + ampm + ' ' + h12 + ':' + min;
        }

        // 날짜 문자열 → 한국어 형식 변환 (영문 Date 문자열도 대응)
        function toKrDateTimeStr(dtStr) {
            if (!dtStr) return '';
            // 이미 한글 형식이면 그대로
            if (dtStr.includes('년') && dtStr.includes('월')) return dtStr;
            // JS Date 문자열 파싱
            const d = new Date(dtStr);
            if (!isNaN(d.getTime())) return formatDateTimeKr(d);
            return dtStr;
        }

        // ─────────────────────────────────────────────
        //  Google Drive URL → 썸네일 URL 변환
        // ─────────────────────────────────────────────
        function toThumbUrl(url) {
            // https://drive.google.com/uc?export=view&id=FILE_ID 형식에서 ID 추출
            if (!url) return '';
            let fileId = '';
            const match1 = url.match(/[?&]id=([^&]+)/);
            if (match1) fileId = match1[1];
            else {
                const match2 = url.match(/\/d\/([^/]+)/);
                if (match2) fileId = match2[1];
            }
            if (fileId) {
                return 'https://lh3.googleusercontent.com/d/' + fileId + '=s300';
            }
            return url; // 변환 불가하면 원본 반환
        }

        // ─────────────────────────────────────────────
        //  내 마커 복원 (서버에서 내 사진 로드)
        // ─────────────────────────────────────────────
        async function loadMyMarkers() {
            const photographer = localStorage.getItem('photographer_name') || '';
            const email = localStorage.getItem('photographer_email') || '';
            if (!photographer) return;

            try {
                const resp = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getMyPhotos',
                        key: API_SECRET,
                        photographer: photographer,
                        email: email
                    })
                });
                const result = await resp.json();
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(function (rec) {
                        if (rec.lat && rec.lng) {
                            addOrUpdateMarker(rec.lat, rec.lng, {
                                bizNumber: rec.bizNumber,
                                photographer: rec.photographer,
                                memo: rec.memo,
                                datetime: rec.datetime,
                                photoUrl: rec.photoUrl
                            });
                        }
                    });
                    showToast('기존 촬영 마커 ' + result.total + '건 표시', 'info');
                }
            } catch (err) {
                console.warn('마커 복원 실패:', err);
            }
        }

        // ─────────────────────────────────────────────
        //  마커 추가 / 업데이트
        // ─────────────────────────────────────────────
        function addOrUpdateMarker(lat, lng, photoData) {
            const key = lat.toFixed(5) + ',' + lng.toFixed(5);

            if (!allMarkers[key]) {
                allMarkers[key] = { photos: [] };
                const marker = new naver.maps.Marker({
                    position: new naver.maps.LatLng(lat, lng),
                    map,
                    icon: {
                        content: buildMarkerHtml(1),
                        anchor: new naver.maps.Point(16, 33)
                    },
                    zIndex: 100
                });
                allMarkers[key].marker = marker;
                naver.maps.Event.addListener(marker, 'click', () => showMarkerPopup(key));
            }
            allMarkers[key].photos.push(photoData);

            // 마커 아이콘 갱신 — 업체 수 기준
            const bizCount = getBizCount(key);
            allMarkers[key].marker.setIcon({
                content: buildMarkerHtml(bizCount),
                anchor: new naver.maps.Point(16, 33)
            });
        }

        // 해당 마커의 고유 업체 수
        function getBizCount(key) {
            const entry = allMarkers[key];
            if (!entry) return 0;
            return [...new Set(entry.photos.map(p => p.bizNumber).filter(Boolean))].length;
        }

        // 해당 마커의 업체별 사진 그룹핑
        function groupPhotosByBiz(key) {
            const entry = allMarkers[key];
            if (!entry) return {};
            const groups = {};
            entry.photos.forEach(function (p) {
                const biz = p.bizNumber || '(미지정)';
                if (!groups[biz]) groups[biz] = [];
                groups[biz].push(p);
            });
            return groups;
        }

        function buildMarkerHtml(bizCount) {
            const badgeHtml = bizCount > 1
                ? '<circle cx="28" cy="8" r="7" fill="white" stroke="#333" stroke-width="1.5"/><text x="28" y="11" font-size="8" font-weight="900" text-anchor="middle" fill="#333" font-family="sans-serif">' + bizCount + '</text>'
                : '';
            return '<div style="width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;">' +
                '<svg width="36" height="36" viewBox="0 0 40 40">' +
                '<path d="M16 8C10.5 8 6 12.5 6 18c0 7.5 10 15 10 15s10-7.5 10-15c0-5.5-4.5-10-10-10z" fill="#3b82f6"/>' +
                '<circle cx="16" cy="18" r="4" fill="white"/>' +
                badgeHtml +
                '</svg></div>';
        }

        // ─────────────────────────────────────────────
        //  마커 팝업 — 업체가 여러 개면 목록, 1개면 바로 상세
        // ─────────────────────────────────────────────
        function showMarkerPopup(key) {
            if (infowindow) infowindow.close();
            const entry = allMarkers[key];
            if (!entry) return;

            const bizGroups = groupPhotosByBiz(key);
            const bizKeys = Object.keys(bizGroups);

            if (bizKeys.length <= 1) {
                showBizDetailPopup(key, bizKeys[0], false);
            } else {
                showBizListPopup(key, bizGroups);
            }
        }

        // 업체 목록 팝업
        function showBizListPopup(key, bizGroups) {
            var listHtml = '<div class="marker-popup">' +
                '<div style="font-size:12px;font-weight:800;color:#94a3b8;margin-bottom:10px;border-bottom:1px solid #e2e8f0;padding-bottom:8px;">' +
                '이 위치에 ' + Object.keys(bizGroups).length + '개 업체</div>' +
                '<div style="max-height:240px;overflow-y:auto;">';

            Object.keys(bizGroups).forEach(function (biz) {
                var photos = bizGroups[biz];
                var thumbSrc = toThumbUrl(photos[0].photoUrl);
                var safeBiz = biz.replace(/'/g, "\\'");
                listHtml += '<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer;border-bottom:1px solid #f1f5f9;" ' +
                    'onclick="showBizDetailFromList(\'' + key + '\',\'' + safeBiz + '\')">' +
                    '<img src="' + thumbSrc + '" style="width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid #e2e8f0;" onerror="this.style.display=\'none\'">' +
                    '<div style="flex:1;min-width:0;">' +
                    '<div style="font-size:13px;font-weight:800;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + biz + '</div>' +
                    '<div style="font-size:11px;color:#94a3b8;font-weight:600;">사진 ' + photos.length + '장</div>' +
                    '</div>' +
                    '<div style="font-size:16px;color:#cbd5e1;flex-shrink:0;">›</div>' +
                    '</div>';
            });

            listHtml += '</div>' +
                '<button class="popup-add-btn" onclick="addPhotoToMarker(\'' + key + '\')">이 위치에 추가 촬영</button>' +
                '</div>';

            infowindow = new naver.maps.InfoWindow({
                content: listHtml, borderWidth: 0, backgroundColor: 'transparent',
                disableAnchor: true, pixelOffset: new naver.maps.Point(0, -10)
            });
            infowindow.open(map, allMarkers[key].marker);
        }

        // 업체 상세 팝업
        function showBizDetailPopup(key, bizNumber, showBack) {
            var entry = allMarkers[key];
            if (!entry) return;

            var bizGroups = groupPhotosByBiz(key);
            var photos = bizGroups[bizNumber] || entry.photos;
            var safeBiz = (bizNumber || '').replace(/'/g, "\\'");

            var thumbs = photos.slice(0, 6).map(function (p) {
                var thumbSrc = toThumbUrl(p.photoUrl);
                return '<img class="popup-thumb" src="' + thumbSrc + '" alt="사진" onclick="window.open(\'' + p.photoUrl + '\',\'_blank\')">';
            }).join('');

            var backBtn = showBack
                ? '<button style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:#64748b;cursor:pointer;margin-bottom:10px;" onclick="showMarkerPopupFromDetail(\'' + key + '\')">← 목록</button>'
                : '';

            var content = '<div class="marker-popup">' + backBtn +
                '<div class="popup-biz">' + bizNumber + '</div>' +
                '<div class="popup-meta">' + toKrDateTimeStr(photos[0].datetime || '') + '</div>' +
                '<div class="popup-count-badge">사진 ' + photos.length + '장</div>' +
                '<div class="popup-thumb-grid">' + thumbs + '</div>' +
                '<button class="popup-add-btn" onclick="addPhotoToMarkerBiz(\'' + key + '\',\'' + safeBiz + '\')">이 위치에 추가 촬영</button>' +
                '</div>';

            if (infowindow) infowindow.close();
            infowindow = new naver.maps.InfoWindow({
                content: content, borderWidth: 0, backgroundColor: 'transparent',
                disableAnchor: true, pixelOffset: new naver.maps.Point(0, -10)
            });
            infowindow.open(map, entry.marker);
        }

        // 목록에서 업체 클릭 → 상세
        window.showBizDetailFromList = function (key, biz) {
            showBizDetailPopup(key, biz, true);
        };

        // 상세에서 ← 목록 클릭
        window.showMarkerPopupFromDetail = function (key) {
            showMarkerPopup(key);
        };

        // 마커에서 추가 촬영 (업체번호 미지정)
        window.addPhotoToMarker = function (key) {
            if (infowindow) infowindow.close();
            const parts = key.split(',');
            pendingLatLng = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
            pendingBizNumber = '';
            document.getElementById('camera-input').click();
        };

        // 마커에서 특정 업체번호로 추가 촬영
        window.addPhotoToMarkerBiz = function (key, biz) {
            if (infowindow) infowindow.close();
            const parts = key.split(',');
            pendingLatLng = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
            pendingBizNumber = biz || '';
            document.getElementById('camera-input').click();
        };

        // ─────────────────────────────────────────────
        //  바텀시트
        // ─────────────────────────────────────────────
        function openBottomSheet() {
            document.getElementById('bottom-sheet-overlay').classList.add('show');
            document.getElementById('bottom-sheet').classList.add('open');
        }

        function closeBottomSheet() {
            document.getElementById('bottom-sheet-overlay').classList.remove('show');
            document.getElementById('bottom-sheet').classList.remove('open');
            // 촬영 배열 초기화
            capturedPhotos = [];
            pendingLatLng = null;
            pendingBizNumber = '';
            clearCaptureState();
            // 입력 필드 초기화
            document.getElementById('input-biz').value = '';
            document.getElementById('input-memo').value = '';
            // 촬영종료 바 제거
            updateCaptureUI();
        }

        // ─────────────────────────────────────────────
        //  촬영자 설정
        // ─────────────────────────────────────────────
        function showPhotographerModal() {
            const saved = localStorage.getItem('photographer_name') || '';
            const savedEmail = localStorage.getItem('photographer_email') || '';
            document.getElementById('photographer-input').value = saved;
            document.getElementById('photographer-email-input').value = savedEmail;
            document.getElementById('photographer-overlay').classList.remove('hidden');
        }

        function savePhotographer() {
            const name = document.getElementById('photographer-input').value.trim();
            const email = document.getElementById('photographer-email-input').value.trim();
            if (!name) { showToast('이름을 입력해주세요.', 'error'); return; }
            localStorage.setItem('photographer_name', name);
            localStorage.setItem('photographer_email', email);
            document.getElementById('photographer-name').textContent = name;
            document.getElementById('photographer-overlay').classList.add('hidden');
            showToast('촬영자 설정 완료', 'success');
            // 기존 마커 제거 후 새 촬영자의 마커 복원
            Object.keys(allMarkers).forEach(function (k) {
                allMarkers[k].marker.setMap(null);
            });
            allMarkers = {};
            loadMyMarkers();
        }

        // Enter 키로 저장
        document.getElementById('photographer-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') savePhotographer();
        });

        // ─────────────────────────────────────────────
        //  토스트
        // ─────────────────────────────────────────────
        let toastTimer = null;
        function showToast(message, type) {
            type = type || 'info';
            const toast = document.getElementById('toast');
            const icons = { success: '✓', error: '✕', info: '' };
            document.getElementById('toast-icon').textContent = icons[type] || '';
            document.getElementById('toast-msg').textContent = message;
            toast.className = 'show ' + type;
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.className = '', 3000);
        }
    </script>
</body>

</html>
